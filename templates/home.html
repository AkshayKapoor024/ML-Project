<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <div class="card form-card">

            <h2>Student Math Score Prediction</h2>

            <form action="/predictions" method="post" class="form-grid">

                <div class="input-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="">Select</option>
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Race / Ethnicity</label>
                    <select name="race_ethnicity" required>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Parental Education</label>
                    <select name="parental_level_of_education" required>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="some college">Some College</option>
                        <option value="master's degree">Master's Degree</option>
                        <option value="associate's degree">Associate Degree</option>
                        <option value="high school">High School</option>
                        <option value="some high school">Some High School</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Lunch</label>
                    <select name="lunch" required>
                        <option value="standard">Standard</option>
                        <option value="free/reduced">Free/Reduced</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Test Preparation</label>
                    <select name="test_preparation_course" required>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Reading Score</label>
                    <input type="number" name="reading_score" min="0" max="100" required>
                </div>

                <div class="input-group">
                    <label>Writing Score</label>
                    <input type="number" name="writing_score" min="0" max="100" required>
                </div>

                <div class="full">
                    <button type="submit" class="primary-btn">Predict Math Score</button>
                </div>

            </form>

            {% if results %}
            <div class="result-box">
                <h3>Predicted Math Score</h3>
                <p>{{ results }}</p>
            </div>
            {% endif %}

        </div>

    </div>

</body>

</html>
